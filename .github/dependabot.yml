version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "needs-manual-review"
      - "pymedphys-compat"
    commit-message:
      prefix: "deps"
    groups:
      core-imaging-stack:
        applies-to: version-updates
        patterns:
          - "pymedphys"
          - "pydicom"
          - "numpy"
          - "scipy"
          - "SimpleITK"
          - "PySide6"
          - "PyQt5"
      routine-python-deps:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "pymedphys"
          - "pydicom"
          - "numpy"
          - "scipy"
          - "SimpleITK"
          - "PySide6"
          - "PyQt5"
